services:
  morsebook:
    build:
      context: .
    container_name: morsebook
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - morsebook_data:/app/data
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/', timeout=5).read()"
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

volumes:
  morsebook_data:
