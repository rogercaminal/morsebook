<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Morse Audiobook Player</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='12' fill='%23116466'/%3E%3Ctext x='32' y='40' text-anchor='middle' font-family='Arial, Helvetica, sans-serif' font-size='24' font-weight='700' fill='white'%3ECW%3C/text%3E%3C/svg%3E">
  <script>
    (() => {
      const stored = localStorage.getItem('morsebook-theme');
      const preferred = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
      document.documentElement.dataset.bsTheme = stored || preferred;
    })();
  </script>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://fkurz.net/ham/jscwlib/releases/jscwlib-0.3.0.js"></script>
  <style>
    :root {
      --mb-surface: #f7f8fa;
      --mb-ink: #1d232f;
      --mb-subtle: #667085;
      --mb-line: #d9dee8;
      --mb-accent: #116466;
      --mb-accent-dark: #0b4a4b;
      --mb-warm: #d7a64a;
    }

    [data-bs-theme="dark"] {
      --mb-surface: #121821;
      --mb-ink: #eef2f6;
      --mb-subtle: #aab4c3;
      --mb-line: #354154;
      --mb-accent: #4db6ac;
      --mb-accent-dark: #7fd6ce;
      --mb-warm: #e2b95f;
    }

    body {
      min-height: 100vh;
      background:
        linear-gradient(180deg, #ffffff 0%, var(--mb-surface) 45%, #eef2f5 100%);
      color: var(--mb-ink);
    }

    [data-bs-theme="dark"] body {
      background:
        linear-gradient(180deg, #0b1119 0%, var(--mb-surface) 48%, #111722 100%);
    }

    .app-shell {
      width: min(100%, 1360px);
      margin: 0 auto;
      padding: 1rem;
    }

    .topbar {
      border-bottom: 1px solid var(--mb-line);
      background: rgba(255, 255, 255, .9);
      backdrop-filter: blur(12px);
    }

    [data-bs-theme="dark"] .topbar {
      background: rgba(14, 20, 30, .9);
    }

    .brand-mark {
      width: 2.25rem;
      height: 2.25rem;
      border-radius: .5rem;
      display: grid;
      place-items: center;
      background: var(--mb-accent);
      color: #fff;
      font-weight: 700;
      letter-spacing: 0;
    }

    .panel {
      border: 1px solid var(--mb-line);
      border-radius: .5rem;
      background: rgba(255, 255, 255, .96);
      box-shadow: 0 .5rem 1.5rem rgba(29, 35, 47, .06);
    }

    [data-bs-theme="dark"] .panel {
      background: rgba(20, 28, 40, .96);
      box-shadow: 0 .5rem 1.5rem rgba(0, 0, 0, .22);
    }

    .panel-header {
      border-bottom: 1px solid var(--mb-line);
      padding: .9rem 1rem;
    }

    .panel-body {
      padding: 1rem;
    }

    .section-title {
      margin: 0;
      font-size: 1rem;
      font-weight: 700;
      letter-spacing: 0;
    }

    .form-label {
      margin-bottom: .3rem;
      color: #344054;
      font-size: .875rem;
      font-weight: 650;
    }

    [data-bs-theme="dark"] .form-label {
      color: #d6dce5;
    }

    .form-control,
    .form-select,
    .btn {
      border-radius: .45rem;
    }

    .btn-primary {
      --bs-btn-bg: var(--mb-accent);
      --bs-btn-border-color: var(--mb-accent);
      --bs-btn-hover-bg: var(--mb-accent-dark);
      --bs-btn-hover-border-color: var(--mb-accent-dark);
      --bs-btn-active-bg: var(--mb-accent-dark);
      --bs-btn-active-border-color: var(--mb-accent-dark);
    }

    .btn-outline-primary {
      --bs-btn-color: var(--mb-accent);
      --bs-btn-border-color: var(--mb-accent);
      --bs-btn-hover-bg: var(--mb-accent);
      --bs-btn-hover-border-color: var(--mb-accent);
    }

    .status-line {
      color: var(--mb-subtle);
      min-height: 1.5rem;
    }

    .book-meta a,
    .lookup-line a {
      color: var(--mb-accent-dark);
      font-weight: 650;
      text-decoration: none;
    }

    .book-meta a:hover,
    .lookup-line a:hover {
      text-decoration: underline;
    }

    #segmentText {
      min-height: 20rem;
      resize: vertical;
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, "Liberation Mono", monospace;
      line-height: 1.45;
      color: #202633;
      background: #fbfcfd;
    }

    [data-bs-theme="dark"] #segmentText {
      color: #e7ecf3;
      background: #101722;
    }

    #player {
      margin-top: 1rem;
      background: var(--bs-body-bg) !important;
      border-color: var(--mb-line) !important;
    }

    #player button,
    #player input,
    #player select {
      margin: .2rem;
      max-width: 100%;
    }

    .compact-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: .75rem;
    }

    @media (max-width: 575.98px) {
      .app-shell {
        padding: .75rem;
      }

      .panel-body,
      .panel-header {
        padding: .85rem;
      }

      .compact-grid {
        grid-template-columns: 1fr;
      }

      .btn,
      .form-control,
      .form-select {
        min-height: 2.65rem;
      }
    }
  </style>
</head>
<body>
  <header class="topbar sticky-top">
    <div class="app-shell py-3">
      <div class="d-flex flex-wrap align-items-center justify-content-between gap-3">
        <div class="d-flex align-items-center gap-3">
          <div class="brand-mark">CW</div>
          <div>
            <h1 class="h4 mb-0">Morse Audiobook Player</h1>
            <div class="text-secondary small">Project Gutenberg reader for CW practice</div>
          </div>
        </div>
        <div class="d-flex flex-wrap align-items-center gap-2">
          <button id="themeToggle" class="btn btn-outline-secondary btn-sm" type="button" aria-pressed="false">Night mode</button>
          <a id="gutenbergLink" class="btn btn-outline-primary btn-sm" href="https://www.gutenberg.org/ebooks/11" target="_blank" rel="noopener">Open on Project Gutenberg</a>
        </div>
      </div>
    </div>
  </header>

  <main class="app-shell py-4">
    <section class="panel mb-4">
      <div class="panel-header d-flex flex-wrap align-items-center justify-content-between gap-2">
        <h2 class="section-title">Import Project Gutenberg TXT</h2>
        <span id="importStatus" class="status-line small"></span>
      </div>
      <div class="panel-body">
        <div class="row g-3 align-items-end">
          <div class="col-12 col-sm-6 col-lg-2">
            <label for="gid" class="form-label">Gutenberg ID</label>
            <input id="gid" class="form-control" type="number" value="11" min="1" inputmode="numeric" />
          </div>
          <div class="col-12 col-sm-6 col-lg-3">
            <label for="targetSecs" class="form-label">Target segment seconds</label>
            <input id="targetSecs" class="form-control" type="number" value="90" min="30" max="600" />
          </div>
          <div class="col-12 col-sm-6 col-lg-2">
            <label for="splitWpm" class="form-label">Split WPM</label>
            <input id="splitWpm" class="form-control" type="number" value="40" min="5" max="80" />
          </div>
          <div class="col-12 col-sm-6 col-lg-2">
            <div class="form-check form-switch pb-lg-2">
              <input id="forceRefresh" class="form-check-input" type="checkbox" role="switch" />
              <label for="forceRefresh" class="form-check-label">Refresh cache</label>
            </div>
          </div>
          <div class="col-12 col-lg-3">
            <div class="d-grid gap-2 d-sm-flex">
              <button id="lookupBtn" class="btn btn-outline-primary flex-fill" type="button">Lookup title</button>
              <button id="importBtn" class="btn btn-primary flex-fill" type="button">Import / Rebuild</button>
            </div>
          </div>
        </div>
        <div class="lookup-line status-line mt-3 d-flex flex-column flex-sm-row gap-2">
          <span id="lookupStatus">Enter an ID to preview its title.</span>
        </div>
      </div>
    </section>

    <div class="row g-4 mb-4">
      <section class="col-12 col-xl-7">
        <div class="panel h-100">
          <div class="panel-header">
            <h2 class="section-title">Library</h2>
          </div>
          <div class="panel-body">
            <div class="row g-2 align-items-end">
              <div class="col-12 col-md">
                <label for="books" class="form-label">Book</label>
                <select id="books" class="form-select"></select>
              </div>
              <div class="col-12 col-md-auto">
                <button id="loadBtn" class="btn btn-primary w-100" type="button">Load</button>
              </div>
            </div>
            <p id="bookMeta" class="book-meta status-line small mb-0 mt-3"></p>
          </div>
        </div>
      </section>

      <section class="col-12 col-xl-5">
        <div class="panel h-100">
          <div class="panel-header">
            <h2 class="section-title">CW Profiles</h2>
          </div>
          <div class="panel-body">
            <div class="row g-2 align-items-end mb-3">
              <div class="col-12 col-md">
                <label for="profiles" class="form-label">Profile</label>
                <select id="profiles" class="form-select"></select>
              </div>
              <div class="col-12 col-md-auto">
                <button id="applyProfile" class="btn btn-outline-primary w-100" type="button">Apply</button>
              </div>
            </div>
            <div class="row g-2 align-items-end">
              <div class="col-12 col-md">
                <label for="profileName" class="form-label">Save current as</label>
                <input id="profileName" class="form-control" placeholder="My QRQ" />
              </div>
              <div class="col-12 col-md-auto">
                <button id="saveProfile" class="btn btn-primary w-100" type="button">Save profile</button>
              </div>
            </div>
          </div>
        </div>
      </section>
    </div>

    <section class="panel">
      <div class="panel-header d-flex flex-wrap align-items-center justify-content-between gap-2">
        <h2 class="section-title">Player</h2>
        <span id="timeInfo" class="status-line small"></span>
      </div>
      <div class="panel-body">
        <div class="row g-3 align-items-end mb-3">
          <div class="col-12 col-lg">
            <label for="chapter" class="form-label">Chapter</label>
            <select id="chapter" class="form-select"></select>
          </div>
          <div class="col-6 col-sm-auto">
            <button id="prevSeg" class="btn btn-outline-secondary w-100" type="button">Prev segment</button>
          </div>
          <div class="col-12 col-sm-4 col-lg-2">
            <label for="segment" class="form-label">Segment</label>
            <input id="segment" class="form-control" type="number" value="0" min="0" />
          </div>
          <div class="col-6 col-sm-auto">
            <button id="nextSeg" class="btn btn-outline-secondary w-100" type="button">Next segment</button>
          </div>
          <div class="col-12 col-lg-auto">
            <button id="saveParams" class="btn btn-outline-primary w-100" type="button">Save CW params</button>
          </div>
        </div>

        <div class="compact-grid mb-3">
          <div>
            <label for="wpm" class="form-label">WPM</label>
            <input id="wpm" class="form-control" type="number" value="40" min="5" max="80" />
          </div>
          <div>
            <label for="eff" class="form-label">Eff WPM</label>
            <input id="eff" class="form-control" type="number" value="0" min="0" max="80" />
          </div>
          <div>
            <label for="freq" class="form-label">Tone Hz</label>
            <input id="freq" class="form-control" type="number" value="600" min="200" max="1200" />
          </div>
          <div>
            <label for="volume" class="form-label">Volume</label>
            <input id="volume" class="form-control" type="number" value="30" min="0" max="100" />
          </div>
          <div>
            <label for="ews" class="form-label">Extra word spacing</label>
            <input id="ews" class="form-control" type="number" value="0" min="0" max="20" />
          </div>
          <div class="d-flex align-items-end">
            <div class="form-check form-switch pb-2">
              <input id="real" class="form-check-input" type="checkbox" role="switch" />
              <label for="real" class="form-check-label">Real speed</label>
            </div>
          </div>
        </div>

        <div class="row g-2 align-items-end mb-3">
          <div class="col-12 col-sm-4 col-md-3 col-xl-2">
            <label for="charOffset" class="form-label">Start char</label>
            <input id="charOffset" class="form-control" type="number" value="0" min="0" />
          </div>
          <div class="col-12 col-sm">
            <div class="d-grid gap-2 d-md-flex">
              <button id="playFromHere" class="btn btn-primary" type="button">Play from char</button>
              <button id="bookmark" class="btn btn-outline-secondary" type="button">Bookmark estimate</button>
              <button id="resume" class="btn btn-outline-secondary" type="button">Resume saved</button>
            </div>
          </div>
        </div>

        <label for="segmentText" class="form-label">Segment text</label>
        <textarea id="segmentText" class="form-control"></textarea>
        <div id="player" class="border rounded p-2 bg-white overflow-auto"></div>
      </div>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
const $ = id => document.getElementById(id);
let currentBook = null, bookMeta = null, chapter = 0, segment = 0, currentText = '', currentChapterSegments = 0;
let cw = null, lastStartedAt = 0, timing = null, profileName = null;
let lookupTimer = null, lookupRequest = 0;
const DEFAULT_PROFILE_NAME = 'VHSC';

function currentTheme() { return document.documentElement.dataset.bsTheme === 'dark' ? 'dark' : 'light'; }
function setTheme(theme) {
  const next = theme === 'dark' ? 'dark' : 'light';
  document.documentElement.dataset.bsTheme = next;
  localStorage.setItem('morsebook-theme', next);
  if ($('themeToggle')) {
    $('themeToggle').textContent = next === 'dark' ? 'Day mode' : 'Night mode';
    $('themeToggle').setAttribute('aria-pressed', String(next === 'dark'));
  }
}
function params() { return { wpm:+$('wpm').value, eff:+$('eff').value, freq:+$('freq').value, volume:+$('volume').value, ews:+$('ews').value, real:$('real').checked }; }
function setParams(p) { $('wpm').value=p.wpm??40; $('eff').value=p.eff??0; $('freq').value=p.freq??600; $('volume').value=p.volume??30; $('ews').value=p.ews??0; $('real').checked=!!p.real; }
function clampOffset(n) { return Math.max(0, Math.min(+n || 0, Math.max(0, currentText.length - 1))); }
function sliceFrom(n) { lastStartedAt = clampOffset(n); $('charOffset').value = lastStartedAt; return currentText.slice(lastStartedAt); }
function apply() { if (!cw) return; const p=params(); cw.setWpm(p.wpm); cw.setEff(p.eff); cw.setFreq(p.freq); cw.setVolume(p.volume); cw.setEws(p.ews); cw.setReal(p.real); }
function optionText(b) { return `${b.title} · ${b.chapters} chapters · ${b.segments} segments`; }
function escapeHtml(s) { return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function gutenbergUrl(id) { return `https://www.gutenberg.org/ebooks/${encodeURIComponent(id)}`; }
function setGutenbergLink(id) {
  const validId = Math.max(1, +id || 11);
  $('gutenbergLink').href = gutenbergUrl(validId);
}

async function api(url, options) {
  const r = await fetch(url, options);
  if (!r.ok) throw new Error(await r.text());
  return r.json();
}

async function loadProfiles() {
  const profiles = await api('/api/profiles');
  $('profiles').innerHTML = profiles.map(p => `<option value="${escapeHtml(p.name)}">${escapeHtml(p.name)} · ${p.params.wpm}/${p.params.eff} @ ${p.params.freq} Hz</option>`).join('');
  $('profiles').dataset.payload = JSON.stringify(profiles);
  if (profiles.some(p => p.name === DEFAULT_PROFILE_NAME)) $('profiles').value = DEFAULT_PROFILE_NAME;
}

async function loadBooks() {
  const books = await api('/api/books');
  $('books').innerHTML = books.map(b => `<option value="${b.id}">${escapeHtml(optionText(b))}</option>`).join('');
}

async function loadBook(id) {
  currentBook = id;
  bookMeta = await api(`/api/books/${id}`);
  $('chapter').innerHTML = bookMeta.chapters.map(c => `<option value="${c.chapter_index}">${c.chapter_index + 1}. ${escapeHtml(c.title)} (${c.segments})</option>`).join('');
  const st = bookMeta.progress || {chapter_index:0, segment_index:0, char_offset:0};
  await loadSegment(st.chapter_index || 0, st.segment_index || 0, st.char_offset || 0);
}

async function loadSegment(c, s, offset=null) {
  if (!currentBook) return;
  const data = await api(`/api/books/${currentBook}/segment/${c}/${s}`);
  chapter = data.chapter_index; segment = data.segment_index; currentText = data.text; currentChapterSegments = data.chapter_segments; timing = data.timing; profileName = data.profile_name;
  $('chapter').value = chapter; $('segment').value = segment; $('segment').max = currentChapterSegments - 1;
  $('segmentText').value = currentText;
  $('bookMeta').innerHTML = `${escapeHtml(bookMeta.title)}: ${escapeHtml(data.chapter_title)}, segment ${segment + 1}/${currentChapterSegments}, ${data.char_count} chars · <a href="${gutenbergUrl(bookMeta.gutenberg_id)}" target="_blank" rel="noopener">Project Gutenberg</a>`;
  setParams(data.params);
  if ($('profiles').options.length) $('profiles').value = profileName || DEFAULT_PROFILE_NAME;
  $('charOffset').value = offset === null ? (data.char_offset || 0) : offset;
  renderPlayer();
  await saveState(false, $('charOffset').value);
}

function renderPlayer() {
  $('player').innerHTML = '';
  cw = new jscw({ wpm:+$('wpm').value, freq:+$('freq').value });
  apply();
  cw.setText(sliceFrom($('charOffset').value));
  cw.renderPlayer('player', cw);
  cw.onPlay = tick;
  cw.onFinished = tick;
  tick();
}

function offsetFromTime(elapsed) {
  if (!timing || !timing.marks || timing.marks.length === 0) {
    const len = cw && cw.getLength ? Math.max(cw.getLength(), 1) : 1;
    return clampOffset(lastStartedAt + Math.floor((elapsed / len) * currentText.slice(lastStartedAt).length));
  }
  const target = (timing.marks.find(m => m.i >= lastStartedAt)?.start || 0) + elapsed;
  let best = lastStartedAt;
  for (const m of timing.marks) {
    if (m.start <= target) best = m.i; else break;
  }
  return clampOffset(best);
}

function tick() {
  if (!cw) return;
  const t = cw.getTime ? cw.getTime() : 0;
  const len = cw.getLength ? cw.getLength() : (timing ? timing.duration : 0);
  const approxChar = offsetFromTime(t);
  $('timeInfo').textContent = `Position ${t.toFixed(1)}s / ${len.toFixed(1)}s · char ≈ ${approxChar}/${currentText.length}`;
  if (cw.getRemaining && cw.getRemaining() > 0) requestAnimationFrame(tick);
}

async function saveState(saveParams=true, offset=null) {
  if (!currentBook) return;
  const body = { chapter_index: chapter, segment_index: segment };
  if (offset !== null) body.char_offset = clampOffset(offset);
  if (saveParams) { body.params = params(); body.profile_name = profileName; }
  return api(`/api/books/${currentBook}/state`, { method:'PATCH', headers:{'content-type':'application/json'}, body:JSON.stringify(body) });
}

async function jump(delta) {
  let c = chapter, s = segment + delta;
  if (s < 0 && c > 0) { c--; s = bookMeta.chapters[c].segments - 1; }
  if (s >= currentChapterSegments && c < bookMeta.chapters.length - 1) { c++; s = 0; }
  s = Math.max(0, Math.min(s, bookMeta.chapters[c].segments - 1));
  await loadSegment(c, s, 0);
}

async function lookupGutenbergTitle() {
  const gid = +$('gid').value;
  setGutenbergLink(gid);
  if (!gid || gid < 1) {
    $('lookupStatus').textContent = 'Enter a positive Gutenberg ID.';
    return;
  }
  const request = ++lookupRequest;
  $('lookupStatus').textContent = 'Looking up title...';
  try {
    const data = await api(`/api/gutenberg/${gid}`);
    if (request !== lookupRequest) return;
    const authorText = data.authors && data.authors.length ? ` by ${data.authors.join(', ')}` : '';
    $('lookupStatus').textContent = `${data.title}${authorText}`;
  } catch (e) {
    if (request !== lookupRequest) return;
    $('lookupStatus').textContent = `No title found for ID ${gid}.`;
  }
}

function scheduleLookup() {
  clearTimeout(lookupTimer);
  setGutenbergLink($('gid').value);
  lookupTimer = setTimeout(lookupGutenbergTitle, 450);
}

$('importBtn').onclick = async () => {
  $('importStatus').textContent = 'Importing...';
  try {
    const body = { gutenberg_id:+$('gid').value, target_segment_seconds:+$('targetSecs').value, wpm_for_split:+$('splitWpm').value, force_refresh:$('forceRefresh').checked };
    const b = await api('/api/import', {method:'POST', headers:{'content-type':'application/json'}, body:JSON.stringify(body)});
    $('importStatus').textContent = `Imported ${b.title} from ${b.source}`;
    await loadBooks(); $('books').value = b.id; await loadBook(b.id);
  } catch (e) { $('importStatus').textContent = e.message; }
};
$('lookupBtn').onclick = lookupGutenbergTitle;
$('themeToggle').onclick = () => setTheme(currentTheme() === 'dark' ? 'light' : 'dark');
$('gid').addEventListener('input', scheduleLookup);
$('loadBtn').onclick = () => $('books').value && loadBook($('books').value);
$('chapter').onchange = () => loadSegment(+$('chapter').value, 0, 0);
$('segment').onchange = () => loadSegment(chapter, +$('segment').value, 0);
$('prevSeg').onclick = () => jump(-1);
$('nextSeg').onclick = () => jump(1);
$('saveParams').onclick = async () => { await saveState(true, $('charOffset').value); renderPlayer(); };
$('playFromHere').onclick = async () => { apply(); cw.play(sliceFrom($('charOffset').value)); await saveState(false, $('charOffset').value); };
$('bookmark').onclick = async () => { const t = cw && cw.getTime ? cw.getTime() : 0; const approx = offsetFromTime(t); $('charOffset').value = approx; await saveState(false, approx); };
$('resume').onclick = async () => { if (!currentBook) return; const st = await api(`/api/books/${currentBook}/state`); await loadSegment(st.chapter_index, st.segment_index, st.char_offset); };
$('applyProfile').onclick = async () => {
  const profiles = JSON.parse($('profiles').dataset.payload || '[]');
  const found = profiles.find(p => p.name === $('profiles').value);
  if (found) { profileName = found.name; setParams(found.params); await saveState(true, $('charOffset').value); renderPlayer(); }
};
$('saveProfile').onclick = async () => {
  const name = $('profileName').value.trim();
  if (!name) return;
  await api('/api/profiles', {method:'POST', headers:{'content-type':'application/json'}, body:JSON.stringify({name, params:params()})});
  await loadProfiles(); $('profiles').value = name;
};
['wpm','eff','freq','volume','ews','real'].forEach(id => $(id).addEventListener('change', () => { profileName = null; if(cw){ apply(); cw.setText(sliceFrom($('charOffset').value)); } }));

loadProfiles();
loadBooks();
setTheme(currentTheme());
setGutenbergLink($('gid').value);
lookupGutenbergTitle();
</script>
</body>
</html>
